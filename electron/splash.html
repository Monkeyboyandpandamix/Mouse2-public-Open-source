<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>M.O.U.S.E. Ground Control Station</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .logo {
      width: 170px;
      height: 170px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
      object-fit: contain;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 40px;
    }
    .loader {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .loader-bar {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 2px;
      animation: loading 1.5s ease-in-out infinite;
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    .status {
      color: #64748b;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <img src="./logo-white.png" alt="M.O.U.S.E. logo" class="logo" />
  <h1>M.O.U.S.E.</h1>
  <p class="subtitle">Ground Control Station</p>
  <div class="loader">
    <div class="loader-bar"></div>
  </div>
  <p class="status" id="status">Starting server...</p>
  <script>
    const messages = [
      'Starting server...',
      'Initializing systems...',
      'Loading interface...'
    ];
    let i = 0;
    setInterval(() => {
      i = (i + 1) % messages.length;
      document.getElementById('status').textContent = messages[i];
    }, 2000);
  </script>
</body>
</html>
